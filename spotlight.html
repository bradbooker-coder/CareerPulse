    id: 'green', name: 'Green Energy', icon: 'green', hue: 'from-lime-400 to-lime-600',
    sponsors: [

      { name: 'Hydro One Careers', role: 'Power Grid', bio: 'Ontario\u2019s largest electricity transmission and distribution company, hiring line technicians and grid engineers.' },
      { name: 'Women in Nuclear Canada', role: 'Nuclear Energy', videoSrc: 'images/win-video.mp4', videoCaption: 'Hannah Connolly \u00b7 Nuclear Operator-in-Training', bio: 'Did you know that over 50% of Ontario\u2019s daily electricity comes from emissions-free nuclear power? <strong>Women in Nuclear (WiN) Canada</strong> is a community of trailblazers making sure women have a seat at the table in this fast-growing tech sector. Since 2004, WiN has been showing how women lead the charge in clean energy, advanced robotics, and producing cancer-fighting medical technologies. Through mentoring, local events, and cool development opportunities, WiN is here to help you connect with pros in the field and launch a career that actually changes the world!', careers: [

  {
    id: 'agrifood', name: 'Agri-Food', icon: 'agrifood', hue: 'from-green-400 to-green-600',
    sponsors: [
      { name: 'Maple Leaf Foods', role: 'Food Company', bio: 'One of Canada\u2019s largest food companies, hiring food scientists, plant technicians, and supply chain talent.' },

    id: 'logistics', name: 'Logistics', icon: 'logistics', hue: 'from-orange-400 to-orange-600',

      { name: 'FreshCo Distribution', role: 'Grocery Distribution', bio: 'A grocery distribution network hiring warehouse, logistics, and supply chain talent that keeps shelves stocked.' },

// ---- State ----
let openSectorId = null;
let activeSectorId = null;
let activeSponsorName = null;
let isFollowing = false;

// ---- Deep-link support from Stage 1's handoff payload ----
const params = new URLSearchParams(window.location.search);
const linkedSectorId = params.get('sector');
const linkedSponsor = params.get('sponsor');

function pickRandomSponsor(sector) {
  const i = Math.floor(Math.random() * sector.sponsors.length);
  return sector.sponsors[i].name;
}

function selectSponsor(sectorId, sponsorName) {
  activeSectorId = sectorId;
  activeSponsorName = sponsorName;
  openSectorId = sectorId;
  isFollowing = false;
  renderFolders();
  renderSpotlight();
}

function toggleSector(sectorId) {
  const sector = SECTORS.find(s => s.id === sectorId);
  if (openSectorId === sectorId) {
    // already open — collapse it
    openSectorId = null;
    renderFolders();
    return;
  }
  // closed -> opening: expand + auto-select a random sponsor inside
  const randomSponsor = pickRandomSponsor(sector);
  selectSponsor(sectorId, randomSponsor);
}

function renderFolders() {
  const wrap = document.getElementById('sector-folders');
  wrap.innerHTML = SECTORS.map(sector => {
    const isOpen = openSectorId === sector.id;
    return `
      <div class="rounded-xl overflow-hidden">
        <button
          class="folder-toggle w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-left hover:bg-neutral1 transition ${isOpen ? 'bg-neutral1' : ''}"
          data-sector-id="${sector.id}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" class="chevron ${isOpen ? 'open' : ''} text-neutral4 shrink-0"><path d="m9 18 6-6-6-6"/></svg>
          <span class="h-7 w-7 rounded-lg bg-white border border-neutral2 flex items-center justify-center text-brandBlue shrink-0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[sector.icon]}</svg>
          </span>
          <span class="text-[13px] font-bold text-neutral6 flex-1 truncate">${sector.name}</span>
          <span class="text-[10px] font-bold text-neutral4">${sector.sponsors.length}</span>
        </button>

        <div class="accordion-panel ${isOpen ? 'open' : ''}">
          <div>
            <div class="pl-9 pr-2 py-1 space-y-0.5">
              ${sector.sponsors.map(sp => {
                const isActive = activeSectorId === sector.id && activeSponsorName === sp.name;
                return `
                  <button
                    class="sponsor-item w-full text-left px-3 py-2 rounded-lg transition ${isActive ? 'bg-brandLightBlue text-brandBlue' : 'text-neutral5 hover:bg-neutral1 hover:text-neutral6'}"
                    data-sector-id="${sector.id}" data-sponsor-name="${sp.name}">
                    <span class="text-[13px] font-semibold leading-snug">${sp.name}</span>
                    <span class="block text-[11px] font-medium leading-snug ${isActive ? 'text-brandBlue' : 'text-neutral4'}">${sp.role}</span>
                  </button>`;
              }).join('')}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderCareersSection(careers) {
  return `
    <div class="mt-6">
      <p class="text-[11px] font-bold uppercase tracking-wider text-neutral4 mb-2.5">Explore Careers in Clean Energy</p>
      <div class="flex gap-3 overflow-x-auto pb-2 -mx-1 px-1">
        ${careers.map(c => `
          <div class="shrink-0 w-[220px] bg-neutral1 border border-neutral2 rounded-xl p-4">
            <p class="text-sm font-extrabold text-neutral6 leading-snug mb-1.5">${c.title}</p>
            <p class="text-xs text-neutral5 leading-relaxed">${c.description}</p>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderSpotlight() {
  const sector = SECTORS.find(s => s.id === activeSectorId);
  const sponsor = sector.sponsors.find(sp => sp.name === activeSponsorName);
  const panel = document.getElementById('spotlight-panel');

  const hasLocalVideo = !!sponsor.videoSrc;
  const hasYoutubeVideo = !!sponsor.youtubeId;

  panel.innerHTML = `
    <div class="mb-6">
      <p class="text-xs font-bold text-brandBlue bg-brandLightBlue inline-flex items-center gap-1.5 px-3 py-1 rounded-full mb-3">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${ICONS[sector.icon]}</svg>
        ${sector.name}
      </p>
      <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-neutral6">${sponsor.name}</h1>
      <p class="text-sm font-semibold text-neutral4 mt-1">${sponsor.role}</p>
    </div>

    <div class="grid md:grid-cols-2 gap-6 items-start">

      <!-- LEFT: VIDEO -->
      <div class="bg-white rounded-2xl border border-neutral2 shadow-card p-4">
        ${hasLocalVideo ? `
          <div class="relative w-full max-w-[340px] mx-auto aspect-[9/16] rounded-3xl overflow-hidden bg-black shadow-card border border-neutral2">
            <video
              class="absolute inset-0 w-full h-full object-cover"
              src="${sponsor.videoSrc}"
              controls
              controlsList="nodownload noremoteplayback"
              disablePictureInPicture
              playsinline
              preload="metadata">
              Your browser does not support the video tag.
            </video>
          </div>
          <p class="text-center text-[11px] text-neutral4 mt-3">${sponsor.videoCaption || 'Featured video \u2014 ' + sponsor.name}</p>
        ` : hasYoutubeVideo ? `
          <div class="relative w-full rounded-2xl overflow-hidden bg-black shadow-inner aspect-video">
            <iframe
              class="absolute inset-0 w-full h-full"
              src="https://www.youtube-nocookie.com/embed/${sponsor.youtubeId}"
              title="${sponsor.name} video"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen>
            </iframe>
          </div>
          <div class="flex items-center justify-between mt-3">
            <p class="text-[11px] text-neutral4">Featured video \u2014 ${sponsor.name}</p>
            <a href="https://www.youtube.com/watch?v=${sponsor.youtubeId}" target="_blank" rel="noopener noreferrer" class="text-[11px] font-bold text-brandBlue hover:text-brandNavy flex items-center gap-1">
              Watch on YouTube
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>

   Canada" has content defined right now — other sponsors show a

   No student data is ever sent anywhere; the reward is a certificate
   generated entirely in the browser (HTML preview + canvas-drawn PNG).
   --------------------------------------------------------------------- */
const quizOverlay = document.getElementById('quiz-modal-overlay');
const quizCard = document.getElementById('quiz-modal-card');
const quizProgressWrap = document.getElementById('quiz-progress-wrap');
const quizContent = document.getElementById('quiz-content');

const QUIZ_GAMES = {

// ---- Mini-game state ----
let quizSponsor = null;
let quizStepIndex = 0;
let quizStage = 'step'; // 'step' | 'reward'
let matcherShuffled = [];
let matcherSelectedCareer = null;
let matcherMatched = [];
let certStudentName = '';

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function openQuizModal(sponsorName) {
  quizSponsor = sponsorName;
  quizStepIndex = 0;
  quizStage = 'step';
  matcherSelectedCareer = null;
  matcherMatched = [];
  certStudentName = '';

  quizOverlay.classList.remove('hidden');
  quizOverlay.classList.add('flex');
  requestAnimationFrame(() => {
    quizOverlay.classList.remove('opacity-0');
    quizCard.classList.remove('opacity-0', 'scale-95');
  });
  document.body.classList.add('overflow-hidden');

  renderQuizContent();
}

function closeQuizModal() {
  quizOverlay.classList.add('opacity-0');
  quizCard.classList.add('opacity-0', 'scale-95');
  document.body.classList.remove('overflow-hidden');
  setTimeout(() => {
    quizOverlay.classList.add('hidden');
    quizOverlay.classList.remove('flex');
  }, 250);
}

function renderProgressBar(totalSteps, currentIndex) {
  quizProgressWrap.innerHTML = `
    <p class="text-[11px] font-bold text-neutral4 uppercase tracking-wider mb-2">Step ${currentIndex + 1} of ${totalSteps}</p>

      ${Array.from({ length: totalSteps }).map((_, i) => `
        <div class="quiz-progress-seg">
          <div class="quiz-progress-seg-fill ${i < currentIndex ? 'filled' : ''}" style="${i === currentIndex ? 'width: 50%;' : ''}"></div>

}

function renderQuizContent() {
  const game = QUIZ_GAMES[quizSponsor];

  if (!game) {
    quizProgressWrap.innerHTML = '';

        <div class="h-14 w-14 rounded-full bg-brandLightBlue flex items-center justify-center mb-4 mx-auto">

  }

        ${game.steps.map(() => `<div class="quiz-progress-seg"><div class="quiz-progress-seg-fill filled"></div></div>`).join('')}

function renderMCQStep(step) {
  quizContent.innerHTML = `
    <div class="pop-in">
      <p class="text-xs font-bold text-brandBlue bg-brandLightBlue inline-block px-2.5 py-1 rounded-full mb-3">${step.eyebrow}</p>

function handleMCQAnswer(step, index, btnEl) {
  const feedback = document.getElementById('mcq-feedback');

      </div>
      <button id="mcq-continue-btn" class="mt-4 w-full bg-brandBlue hover:bg-brandNavy text-white text-sm font-bold py-3 rounded-xl shadow-sm shadow-brandBlue/20 transition">
        Continue

    document.getElementById('mcq-continue-btn').addEventListener('click', () => {
      quizStepIndex += 1;
      renderQuizContent();
    });

    btnEl.classList.add('shake', 'border-rose-300', 'bg-rose-50');
    setTimeout(() => btnEl.classList.remove('shake'), 400);

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" class="text-amber-600 shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>

  }
}

function renderMatcherStep(step) {
  if (matcherShuffled.length === 0) {
    matcherShuffled = shuffleArray(step.careers.map(c => step.descriptions[c]));
  }

  quizContent.innerHTML = `
    <div class="pop-in">
      <p class="text-xs font-bold text-brandBlue bg-brandLightBlue inline-block px-2.5 py-1 rounded-full mb-3">${step.eyebrow}</p>
      <h3 class="text-lg font-extrabold text-neutral6 leading-snug">${step.prompt}</h3>

      <div class="grid grid-cols-2 gap-3 mt-5">
        <div class="space-y-2">
          ${step.careers.map(career => {
            const isMatched = matcherMatched.includes(career);
            const isSelected = matcherSelectedCareer === career;
            return `
              <button
                class="matcher-career w-full text-left px-3 py-3 rounded-xl border text-sm font-semibold transition
                  ${isMatched ? 'border-emerald-300 bg-emerald-50 text-emerald-700 pointer-events-none' : isSelected ? 'border-brandBlue bg-brandLightBlue text-brandBlue ring-2 ring-brandBlue/30' : 'border-neutral2 hover:border-brandBlue/50 hover:bg-brandLightBlue/40 text-neutral6'}"
                data-career="${career}">
                ${career} ${isMatched ? '\u2713' : ''}
              </button>`;
          }).join('')}
        </div>
        <div class="space-y-2">
          ${matcherShuffled.map(desc => {
            const isMatched = matcherMatched.some(c => step.descriptions[c] === desc);
            return `
              <button
                class="matcher-desc w-full text-left px-3 py-3 rounded-xl border text-sm font-medium transition
                  ${isMatched ? 'border-emerald-300 bg-emerald-50 text-emerald-700 pointer-events-none' : 'border-neutral2 hover:border-brandBlue/50 hover:bg-brandLightBlue/40 text-neutral5'}"
                data-desc="${desc}">
                ${desc} ${isMatched ? '\u2713' : ''}
              </button>`;
          }).join('')}
        </div>
      </div>

      <div id="matcher-feedback" class="mt-4"></div>
      <div id="matcher-continue-wrap" class="mt-2"></div>
    </div>`;

  quizContent.querySelectorAll('.matcher-career').forEach(btn => {
    btn.addEventListener('click', () => {
      matcherSelectedCareer = matcherSelectedCareer === btn.dataset.career ? null : btn.dataset.career;
      renderMatcherStep(step);
    });
  });

  quizContent.querySelectorAll('.matcher-desc').forEach(btn => {
    btn.addEventListener('click', () => handleMatcherDescClick(step, btn));
  });

  if (matcherMatched.length === step.careers.length) {
    document.getElementById('matcher-continue-wrap').innerHTML = `
      <button id="matcher-continue-btn" class="w-full bg-brandBlue hover:bg-brandNavy text-white text-sm font-bold py-3 rounded-xl shadow-sm shadow-brandBlue/20 transition pop-in">
        Continue to Your Certificate
      </button>`;
    document.getElementById('matcher-continue-btn').addEventListener('click', () => {
      quizStage = 'reward';
      renderQuizContent();
    });
  }
}

function handleMatcherDescClick(step, btnEl) {
  const feedback = document.getElementById('matcher-feedback');

  if (!matcherSelectedCareer) {
    feedback.innerHTML = `<p class="text-xs font-semibold text-neutral4">Select a career on the left first.</p>`;
    return;
  }

  const desc = btnEl.dataset.desc;
  if (step.descriptions[matcherSelectedCareer] === desc) {
    matcherMatched.push(matcherSelectedCareer);
    matcherSelectedCareer = null;
    feedback.innerHTML = `<p class="text-xs font-bold text-emerald-600">Nice match!</p>`;
    renderMatcherStep(step);
  } else {
    btnEl.classList.add('shake', 'border-rose-300', 'bg-rose-50');
    setTimeout(() => btnEl.classList.remove('shake', 'border-rose-300', 'bg-rose-50'), 400);
    feedback.innerHTML = `<p class="text-xs font-semibold text-amber-600">Not quite a match \u2014 try again.</p>`;
    matcherSelectedCareer = null;
    renderMatcherStep(step);
  }
}

function downloadCertificatePNG(name, game, dateStr) {
  const canvas = document.getElementById('cert-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#F6F6FF');
  bgGrad.addColorStop(1, '#ffffff');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Outer border
  ctx.strokeStyle = '#C6E7FF';
  ctx.lineWidth = 6;
  ctx.strokeRect(24, 24, W - 48, H - 48);
  ctx.strokeStyle = '#0092FF';
  ctx.lineWidth = 2;
  ctx.strokeRect(40, 40, W - 80, H - 80);

  // Wordmark
  ctx.fillStyle = '#0092FF';
  ctx.beginPath();
  ctx.roundRect(W / 2 - 220, 90, 34, 34, 8);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('\u26A1', W / 2 - 203, 114);

  ctx.fillStyle = '#22224C';
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('CareerPulse Ontario', W / 2 - 175, 116);

  // Eyebrow
  ctx.fillStyle = '#0092FF';
  ctx.font = 'bold 15px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('C E R T I F I C A T E   O F   C O M P L E T I O N', W / 2, 190);

  // "This certifies that"
  ctx.fillStyle = '#485163';
  ctx.font = 'italic 20px Georgia';
  ctx.fillText('This certifies that', W / 2, 250);

  // Name (auto-shrink for long names)
  let nameFontSize = 56;
  ctx.font = `bold ${nameFontSize}px Georgia`;
  while (ctx.measureText(name).width > W - 200 && nameFontSize > 24) {
    nameFontSize -= 2;
    ctx.font = `bold ${nameFontSize}px Georgia`;
  }
  ctx.fillStyle = '#252A33';
  ctx.fillText(name, W / 2, 330);

  // Body text
  ctx.fillStyle = '#485163';
  ctx.font = '20px Arial';
  ctx.fillText('has completed the Women in Nuclear Canada Spotlight', W / 2, 400);
  ctx.fillText('and earned the', W / 2, 428);

  // Badge pill
  ctx.font = 'bold 20px Arial';
  const badgeText = `${game.badge} Badge`;
  const badgeWidth = ctx.measureText(badgeText).width + 60;
  ctx.fillStyle = '#C6E7FF';
  ctx.beginPath();
  ctx.roundRect(W / 2 - badgeWidth / 2, 460, badgeWidth, 46, 23);
  ctx.fill();
  ctx.fillStyle = '#22224C';
  ctx.fillText(badgeText, W / 2, 489);

  // Footer
  ctx.fillStyle = '#AAB7CB';
  ctx.font = '15px Arial';
  ctx.fillText(`${dateStr} \u00b7 National Career Development Month`, W / 2, 720);
  ctx.fillText('powered by myBlueprint', W / 2, 745);

  // Trigger download
  const dataUrl = canvas.toDataURL('image/png');
  const link = document.createElement('a');
  const safeName = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  link.href = dataUrl;
  link.download = `careerpulse-certificate-${safeName || 'student'}.png`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  console.log('%c[CareerPulse] Certificate generated', 'color:#0092FF;font-weight:bold;', {
    sponsor: quizSponsor,
    sector: activeSectorId,
    studentName: name
  });
}

document.getElementById('quiz-close-btn').addEventListener('click', closeQuizModal);
quizOverlay.addEventListener('click', (e) => {
  if (e.target === quizOverlay) closeQuizModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !quizOverlay.classList.contains('hidden')) closeQuizModal();
});
quizContent.addEventListener('click', (e) => {
  if (e.target.closest('.quiz-close-inline')) closeQuizModal();
});

/* ---------------------------------------------------------------------
   INITIAL RENDER
   Honors ?sector=&sponsor= from a Stage 1 handoff; otherwise opens
   the first sector with a randomly chosen sponsor.
   --------------------------------------------------------------------- */
(function init() {
  renderFolders();

  const linkedSector = SECTORS.find(s => s.id === linkedSectorId);
  if (linkedSector) {
    const matchedSponsor = linkedSector.sponsors.find(sp => sp.name === linkedSponsor);
    selectSponsor(linkedSector.id, matchedSponsor ? matchedSponsor.name : pickRandomSponsor(linkedSector));
  } else {
    const defaultSector = SECTORS[0];
    selectSponsor(defaultSector.id, pickRandomSponsor(defaultSector));
  }
})();
</script>
