<script src="sponsorData.js"></script>
<style>
  body { font-family: 'Open Sans', sans-serif; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

<body class="bg-brandOffWhite text-neutral6 antialiased">

<!-- ============ TOP NAVBAR (identical across the app) ============ -->
<header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-neutral2">
  <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">

<div class="max-w-[1300px] mx-auto px-6 py-6">

  <!-- Back button -->
  <a id="back-to-sector-link" href="sector.html" class="inline-flex items-center gap-1.5 text-xs font-bold text-neutral4 hover:text-brandBlue transition mb-5">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    Back to Sector Spotlight
  </a>

  <!-- Compact booth identity strip (kept small on purpose — the real
       content lives in the scrollable left pane below) -->
  <div id="booth-strip" class="mb-6"></div>

  <!-- ============ SPLIT-SCREEN LAYOUT ============
       Mobile: single column (default flex-col).
       md+: 2-column grid — left pane scrolls with the page, right pane
       is sticky and scrolls independently once its content overflows. -->
  <div class="flex flex-col md:flex-row gap-8 items-start">

    <!-- LEFT PANE — scrollable sponsor educational content -->
    <div id="booth-left-pane" class="flex-1 min-w-0 space-y-5"></div>

    <!-- RIGHT PANE — sticky, holds the Tier 1 game + Tier 2 form -->
    <div id="booth-right-pane" class="w-full md:w-[420px] shrink-0 md:sticky md:top-20 md:max-h-[calc(100vh-6rem)] md:overflow-y-auto space-y-5 pb-2"></div>

  </div>

<script>
/* =========================================================================
   CAREERPULSE — SPONSOR BOOTH (split-screen model)
   Left pane: scrollable sponsor content (video, bio, quick facts, careers).
   Right pane: sticky, holds two low-friction activities instead of a
   multi-step quiz —
     Tier 1 "Which Nuclear Career Are You?" — a 5-question personality
                                        quiz, tap-only, no timer
     Tier 2 "Accept a Challenge" — a single-step choice + short-answer form

   IMPORTANT SCOPE NOTE: the career-matcher quiz and the two WiN Challenge
   prompts below are specific to Women in Nuclear Canada — they reference
   her actual video and nuclear-specific content, so they can't reasonably
   be generic/data-driven the way the old quiz engine was. Any sponsor
   other than WiN currently sees a friendly "coming soon" state in both
   tiers. When more sponsors are ready for real activities, each will
   need its own bespoke Tier 1/Tier 2 build the same way this one is.

   URL contract (unchanged):
     ?sponsor=<sponsor trackId> - resolves both the sponsor and its sector
     &id=<sectorId>             - fallback context when no sponsor resolves
     &action=tier1|tier2        - which activity to scroll to on load
   ========================================================================= */

const ICONS = {
  healthcare: '<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>',
  trades: '<path d="m14.7 6.3 3 3L7 20H4v-3z"/><path d="m17.7 3.3 3 3-2.5 2.5-3-3z"/>',
  green: '<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 9.3 17 9.3S12.5 9 11 20z"/><path d="M11 20c0-6 3-9 8-9"/>',
  tech: '<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/>',
  manufacturing: '<path d="M2 20h20"/><path d="M4 20V10l5 4V10l5 4V10l5 4v6"/>',
  agrifood: '<path d="M12 2c4 3 6 6 6 10a6 6 0 0 1-12 0c0-4 2-7 6-10z"/><path d="M12 12v10"/>',
  aerospace: '<path d="m17.8 19.1 2-1L18 12l1.8-4.8a1.5 1.5 0 0 0-2.6-1.5L14 10l-6.5-2.2-1.4 1.4L11 12l-3 3H5l-1.5 1.5 3 1 1 3L9 19v-3l3-3 3.1 4.9z"/>',
  logistics: '<rect x="1" y="7" width="15" height="10" rx="1"/><path d="M16 10h4l3 3v4h-7z"/><circle cx="6" cy="19" r="2"/><circle cx="18" cy="19" r="2"/>',
  tourism: '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20M2 12h20"/>'
};

function pickRandomSectorId() {
  const keys = Object.keys(sponsorData);
  return keys[Math.floor(Math.random() * keys.length)];
}

function findSponsorByTrackId(trackId) {
  for (const sid of Object.keys(sponsorData)) {
    const sec = sponsorData[sid];
    const match = (sec.sponsors || []).find(sp => sp.trackId === trackId);
    if (match) return { sponsor: match, sector: sec, sectorId: sid };
  }
  return null;
}

/* ---------------------------------------------------------------------
   COMPACT BOOTH STRIP — small branded header, not a massive hero. The
   real content now lives in the left pane per the split-screen design.
   --------------------------------------------------------------------- */
function renderBoothStrip(sector, sponsor) {
  const initial = (sponsor ? sponsor.name : sector.name).charAt(0).toUpperCase();
  const displayName = sponsor ? sponsor.name : `${sector.name} Booth`;

  document.getElementById('booth-strip').innerHTML = `
    <div class="rounded-2xl overflow-hidden shadow-card fade-in-up">
      <div class="flex items-center gap-3 px-5 py-4 bg-gradient-to-br ${sector.hue}">
        <div class="h-11 w-11 rounded-xl bg-white/20 backdrop-blur flex items-center justify-center text-white text-lg font-extrabold shrink-0">${initial}</div>
        <div class="min-w-0">
          <p class="text-[10px] font-extrabold uppercase tracking-wider text-white/75 flex items-center gap-1.5">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">${ICONS[sector.icon]}</svg>
            ${sector.name} \u00b7 Sponsor Booth
          </p>
          <h1 class="text-lg font-extrabold text-white truncate">${displayName}</h1>
        </div>
      </div>
    </div>`;
}

/* ---------------------------------------------------------------------
   LEFT PANE — video, bio, quick facts, careers
   --------------------------------------------------------------------- */
function sponsorVideoBlock(sponsor, sector) {
  const localSrc = sponsor.videoSrc || sector.fallbackVideo;
  const isFallback = !sponsor.videoSrc && !sponsor.youtubeId && !!sector.fallbackVideo;

  if (sponsor.youtubeId) {
    return `
      <div class="relative w-full rounded-xl overflow-hidden bg-black aspect-video">
        <iframe class="absolute inset-0 w-full h-full" src="https://www.youtube-nocookie.com/embed/${sponsor.youtubeId}" title="${sponsor.name} video" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>`;
  }

  return `
    <div class="relative w-full max-w-[240px] mx-auto aspect-[9/16] rounded-2xl overflow-hidden bg-black border border-neutral2">
      <video class="absolute inset-0 w-full h-full object-cover" src="${localSrc}" controls controlsList="nodownload noremoteplayback" disablePictureInPicture playsinline preload="metadata">
        Your browser does not support the video tag.
      </video>
    </div>
    <p class="text-center text-[11px] text-neutral4 mt-2">${sponsor.videoCaption || (isFallback ? `General ${sector.name} careers preview` : 'Featured video')}</p>`;
}

function renderQuickFacts(sector) {
  return `
    <div class="bg-white rounded-2xl border border-neutral2 shadow-card p-5 fade-in-up">
      <p class="text-[10px] font-bold uppercase tracking-wider text-neutral4 mb-3">Quick Facts</p>
      <div class="grid sm:grid-cols-2 gap-3">
        <div class="bg-brandOffWhite border border-neutral2 rounded-xl p-3.5">
          <p class="text-[10px] font-bold uppercase tracking-wider text-neutral4">Earning Potential</p>
          <p class="text-sm font-extrabold text-brandBlue mt-1">${sector.earningPotential}</p>
        </div>
        <div class="bg-brandOffWhite border border-neutral2 rounded-xl p-3.5">
          <p class="text-[10px] font-bold uppercase tracking-wider text-neutral4">Canada Outlook</p>
          <p class="text-xs font-bold text-neutral6 mt-1 leading-snug">${sector.marketOutlook}</p>
        </div>
      </div>
    </div>`;
}

function renderCareersList(careers) {
  return `
    <div class="bg-white rounded-2xl border border-neutral2 shadow-card p-5 fade-in-up">
      <p class="text-[10px] font-bold uppercase tracking-wider text-neutral4 mb-3">Careers to Explore</p>
      <div class="space-y-2.5">
        ${careers.map(c => `
          <div class="flex gap-3 px-3.5 py-3 rounded-xl bg-brandOffWhite border border-neutral2">
            <span class="h-6 w-6 rounded-full bg-brandLightBlue flex items-center justify-center text-brandBlue shrink-0 mt-0.5">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </span>
            <div>
              <p class="text-sm font-extrabold text-neutral6">${c.title}</p>
              <p class="text-xs text-neutral5 leading-relaxed mt-0.5">${c.description}</p>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderLeftPane(sector, sponsor) {
  const bio = sponsor ? sponsor.bio : `No employer partner has claimed this booth yet. In the meantime, explore what a career in ${sector.name} actually looks like.`;
  const careers = (sponsor && sponsor.careers) ? sponsor.careers : sector.careers;

  document.getElementById('booth-left-pane').innerHTML = `
    <div class="bg-white rounded-2xl border border-neutral2 shadow-card p-5 fade-in-up">
      ${sponsor ? sponsorVideoBlock(sponsor, sector) : ''}
      <p class="text-sm text-neutral5 leading-relaxed ${sponsor ? 'mt-4' : ''}">${bio}</p>
    </div>
    ${renderQuickFacts(sector)}
    ${renderCareersList(careers)}
  `;
}

/* ---------------------------------------------------------------------
   RIGHT PANE — Tier 1 Career Matcher Quiz + Tier 2 Challenge Form
   --------------------------------------------------------------------- */
function renderComingSoonCard(tierLabel, title, who) {
  return `
    <div class="bg-white rounded-2xl border border-neutral2 shadow-card p-5 text-center py-8 fade-in-up">
      <div class="h-11 w-11 rounded-full bg-brandLightBlue flex items-center justify-center mb-3 mx-auto text-brandBlue">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </div>
      <p class="text-[10px] font-bold uppercase tracking-wider text-neutral4 mb-1">${tierLabel}</p>
      <h3 class="text-sm font-extrabold text-neutral6">${title}</h3>
      <p class="text-xs text-neutral5 mt-1">We're still building this activity for ${who}.</p>
    </div>`;
}

function renderRightPane(sector, sponsor) {
  const isWin = sponsor && sponsor.trackId === 'win';
  const who = sponsor ? sponsor.name : sector.name;

  if (isWin) currentSponsorCareers = sponsor.careers || [];

  const tier1Html = isWin
    ? `<div id="tier1-card" class="bg-white rounded-2xl border border-neutral2 shadow-card p-5 fade-in-up">
        <p class="text-[10px] font-bold uppercase tracking-wider text-neutral4 mb-1">Tier 1 \u00b7 2-Minute Challenge</p>
        <h3 class="text-lg font-extrabold text-neutral6 mb-1">\ud83c\udf1f Which Nuclear Career Are You?</h3>
        <p class="text-xs text-neutral5 leading-relaxed mb-4">Answer 5 quick questions to find out which real Women in Nuclear career fits you best.</p>
        <div id="career-quiz-root">
          <button id="career-quiz-start-btn" class="w-full bg-brandBlue hover:bg-brandNavy text-white text-sm font-extrabold py-3 rounded-xl transition">Start Quiz</button>
        </div>
      </div>`
    : `<div id="tier1-card">${renderComingSoonCard('Tier 1', 'Quick Challenge', who)}</div>`;

  const tier2Html = isWin
    ? `<div id="tier2-card" class="bg-white rounded-2xl border border-neutral2 shadow-card p-5 fade-in-up">
        <p class="text-[10px] font-bold uppercase tracking-wider text-neutral4 mb-1">Tier 2 \u00b7 Creative Challenge</p>
        <h3 class="text-lg font-extrabold text-neutral6 mb-3">Accept a WiN Challenge</h3>
        <label class="text-xs font-bold text-neutral5 mb-1.5 block">Which WiN Challenge would you like to accept?</label>
        <select id="challenge-select" class="w-full rounded-xl border border-neutral2 px-3 py-2.5 text-sm font-semibold text-neutral6 focus:outline-none focus:ring-2 focus:ring-brandBlue">
          <option value="">Choose a challenge...</option>
          <option value="townhall">\ud83c\udfdb\ufe0f Town Hall Pitch</option>
          <option value="pathway">\ud83d\uddfa\ufe0f Pathway Plan</option>
        </select>
        <div id="challenge-prompt-wrap" class="mt-3"></div>
      </div>`
    : `<div id="tier2-card">${renderComingSoonCard('Tier 2', 'Creative Challenge', who)}</div>`;

  document.getElementById('booth-right-pane').innerHTML = tier1Html + tier2Html;

  if (isWin) {
    document.getElementById('career-quiz-start-btn').addEventListener('click', startCareerQuiz);
    document.getElementById('challenge-select').addEventListener('change', (e) => renderChallengePrompt(e.target.value));
  }
}

/* =========================================================================
   TIER 1 — "WHICH NUCLEAR CAREER ARE YOU?" (Women in Nuclear Canada)
   A 5-question, tap-only personality quiz (no typing, no timer). Each
   answer awards points toward one or more of WiN's 4 real careers;
   whichever career scores highest at the end is revealed as the match.
   Career titles/descriptions are pulled live from sponsor.careers in
   sponsorData.js (currentSponsorCareers) rather than duplicated here,
   so this stays in sync if that content ever changes.
   ========================================================================= */
let currentSponsorCareers = [];
let careerQuizScores = {};
let careerQuizStepIndex = 0;

const CAREER_QUIZ_QUESTIONS = [
  {
    prompt: 'Which excites you more?',
    options: [
      { text: 'Working with machines, systems, and technology', points: { 'Nuclear Operator-in-Training (NOIT)': 1, 'Instrument & Control (I&C) Tech': 1 } },
      { text: 'Helping keep people safe and healthy', points: { 'Radiation Safety Technician': 1, 'Medical Isotope Specialist': 1 } }
    ]
  },
  {
    prompt: 'When you imagine "working with technology," what appeals more?',
    options: [
      { text: 'Watching live data and making real-time calls', points: { 'Nuclear Operator-in-Training (NOIT)': 2 } },
      { text: 'Taking things apart, fixing, and calibrating them', points: { 'Instrument & Control (I&C) Tech': 2 } }
    ]
  },
  {
    prompt: 'When you imagine "helping keep people safe," what appeals more?',
    options: [
      { text: 'Following procedures and inspecting for hazards', points: { 'Radiation Safety Technician': 2 } },
      { text: 'Using science to directly treat patients', points: { 'Medical Isotope Specialist': 2 } }
    ]
  },
  {
    prompt: 'Pick a work style:',
    options: [
      { text: '\u26a1 Fast-paced, always monitoring something', points: { 'Nuclear Operator-in-Training (NOIT)': 1 } },
      { text: '\ud83d\udd0d Detail-oriented and methodical', points: { 'Radiation Safety Technician': 1 } },
      { text: '\ud83d\udd27 Hands-on with tools and machines', points: { 'Instrument & Control (I&C) Tech': 1 } },
      { text: '\ud83d\udd2c Precise, science-driven work', points: { 'Medical Isotope Specialist': 1 } }
    ]
  },
  {
    prompt: 'If you had to pick one task for your dream job, which sounds best?',
    options: [
      { text: 'Keep a power plant running safely, 24/7', points: { 'Nuclear Operator-in-Training (NOIT)': 1 } },
      { text: 'Patrol facilities with a safety scanner', points: { 'Radiation Safety Technician': 1 } },
      { text: 'Wire up and test high-tech sensors', points: { 'Instrument & Control (I&C) Tech': 1 } },
      { text: 'Package life-saving medicine for hospitals', points: { 'Medical Isotope Specialist': 1 } }
    ]
  }
];

function startCareerQuiz() {
  careerQuizScores = {};
  careerQuizStepIndex = 0;
  renderCareerQuizQuestion();
}

function renderCareerQuizQuestion() {
  const root = document.getElementById('career-quiz-root');
  const total = CAREER_QUIZ_QUESTIONS.length;
  const q = CAREER_QUIZ_QUESTIONS[careerQuizStepIndex];

  root.innerHTML = `
    <div class="pop-in">
      <p class="text-[11px] font-bold text-neutral4 uppercase tracking-wider mb-2">Question ${careerQuizStepIndex + 1} of ${total}</p>
      <div class="flex gap-1.5 mb-4">
        ${Array.from({ length: total }).map((_, i) => `<div class="flex-1 h-1.5 rounded-full ${i <= careerQuizStepIndex ? 'bg-brandBlue' : 'bg-neutral1'}"></div>`).join('')}
      </div>
      <h4 class="text-sm font-extrabold text-neutral6 mb-3">${q.prompt}</h4>
      <div class="space-y-2">
        ${q.options.map((opt, i) => `
          <button class="career-quiz-option w-full text-left px-4 py-3 rounded-xl border border-neutral2 hover:border-brandBlue/50 hover:bg-brandLightBlue/40 transition text-sm font-medium text-neutral6" data-index="${i}">
            ${opt.text}
          </button>`).join('')}
      </div>
    </div>`;

  root.querySelectorAll('.career-quiz-option').forEach(btn => {
    btn.addEventListener('click', () => handleCareerQuizAnswer(q, parseInt(btn.dataset.index, 10)));
  });
}

function handleCareerQuizAnswer(question, optionIndex) {
  const chosen = question.options[optionIndex];
  Object.entries(chosen.points).forEach(([career, pts]) => {
    careerQuizScores[career] = (careerQuizScores[career] || 0) + pts;
  });

  careerQuizStepIndex += 1;
  if (careerQuizStepIndex >= CAREER_QUIZ_QUESTIONS.length) {
    renderCareerQuizResult();
  } else {
    renderCareerQuizQuestion();
  }
}

function renderCareerQuizResult() {
  // Fixed order just breaks ties deterministically — first-highest wins.
  const CAREER_ORDER = [
    'Nuclear Operator-in-Training (NOIT)',
    'Radiation Safety Technician',
    'Medical Isotope Specialist',
    'Instrument & Control (I&C) Tech'
  ];
  let bestCareer = CAREER_ORDER[0];
  let bestScore = -1;
  CAREER_ORDER.forEach(career => {
    const score = careerQuizScores[career] || 0;
    if (score > bestScore) { bestScore = score; bestCareer = career; }
  });

  const careerInfo = currentSponsorCareers.find(c => c.title === bestCareer) || { title: bestCareer, description: '' };

  document.getElementById('career-quiz-root').innerHTML = `
    <div class="text-center pop-in">
      <div class="text-3xl mb-2">\ud83c\udf1f</div>
      <p class="text-[11px] font-bold text-brandBlue uppercase tracking-wider mb-1">Your Nuclear Career Match</p>
      <h4 class="text-lg font-extrabold text-neutral6 mb-2">${careerInfo.title}</h4>
      <p class="text-xs text-neutral5 leading-relaxed mb-5">${careerInfo.description}</p>
      <a href="https://www.myblueprint.ca/" target="_blank" rel="noopener noreferrer" class="block w-full bg-brandBlue hover:bg-brandNavy text-white text-sm font-extrabold py-3 rounded-xl transition mb-2">Explore This Career on myBlueprint</a>
      <button id="career-quiz-retry-btn" class="text-xs font-bold text-neutral4 hover:text-brandBlue transition">Try again</button>
    </div>`;

  document.getElementById('career-quiz-retry-btn').addEventListener('click', startCareerQuiz);
}

/* =========================================================================
   TIER 2 — "ACCEPT A WIN CHALLENGE" (single-step, AI-resistant form)
   No PII is ever handled by this script: the written answer is never
   sent anywhere by our JS (only discarded client-side on submit), and
   the prize-draw email is collected entirely on Formspree's own page —
   we only link out to it.
   ========================================================================= */
const CHALLENGE_PROMPTS = {
  townhall: {
    prompt: 'Your city is voting on installing a Small Modular Reactor (SMR). Write a 3-sentence opening statement for the town hall meeting. Use at least one fact from the WiN video to support the benefits, and name and address one common concern.',
    placeholder: 'Type your opening statement...'
  },
  pathway: {
    prompt: "Pick a nuclear energy occupation from the bios on the left. Tell us the job title, list the important skills required, explain why you're interested in it, and list two specific high school courses you could add to your myBlueprint plan next year to prepare for that career.",
    placeholder: 'Type your pathway plan...'
  }
};

function renderChallengePrompt(key) {
  const wrap = document.getElementById('challenge-prompt-wrap');
  if (!key) { wrap.innerHTML = ''; return; }

  const challenge = CHALLENGE_PROMPTS[key];
  wrap.innerHTML = `
    <div class="pop-in">
      <p class="text-xs text-neutral5 leading-relaxed bg-brandOffWhite border border-neutral2 rounded-xl p-3 mb-3">${challenge.prompt}</p>
      <textarea id="challenge-answer" rows="5" placeholder="${challenge.placeholder}" class="w-full rounded-xl border border-neutral2 px-3 py-2.5 text-sm text-neutral6 placeholder:text-neutral4 focus:outline-none focus:ring-2 focus:ring-brandBlue resize-none"></textarea>
      <p id="challenge-error" class="text-xs font-semibold text-rose-500 mt-1.5 hidden">Write a bit more before submitting \u2014 aim for a few real sentences!</p>
      <button id="challenge-submit-btn" class="mt-3 w-full bg-brandNavy hover:bg-brandBlue text-white text-sm font-extrabold py-3 rounded-xl transition">Submit Challenge</button>
    </div>`;

  document.getElementById('challenge-submit-btn').addEventListener('click', () => submitChallenge(key));
}

function submitChallenge(challengeKey) {
  const textarea = document.getElementById('challenge-answer');
  const errorEl = document.getElementById('challenge-error');
  const answer = textarea.value.trim();

  if (answer.length < 30) {
    errorEl.classList.remove('hidden');
    textarea.classList.add('shake');
    setTimeout(() => textarea.classList.remove('shake'), 400);
    return;
  }
  errorEl.classList.add('hidden');

  // Only which challenge was completed is logged — never the written
  // answer itself. No PII, no free-text content leaves the browser.
  console.log('%c[CareerPulse] WiN challenge submitted', 'color:#0092FF;font-weight:bold;', { challenge: challengeKey });

  document.getElementById('challenge-prompt-wrap').innerHTML = `
    <div class="text-center py-4 pop-in">
      <div class="text-3xl mb-2">\ud83c\udf89</div>
      <h4 class="text-sm font-extrabold text-neutral6">Challenge submitted!</h4>
      <p class="text-xs text-neutral5 mt-1 mb-4">Great work thinking like a real WiN professional.</p>
      <a href="https://formspree.io/dummy" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-xs font-bold text-brandBlue hover:text-brandNavy transition">
        Enter your email for the prize draw
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
    </div>`;

  document.getElementById('challenge-select').value = '';
}

/* ---------------------------------------------------------------------
   INIT — resolve sponsor/sector from the URL, render everything, and
   scroll to the requested tier card within the (possibly sticky/
   scrollable) right pane.
   --------------------------------------------------------------------- */
(function init() {
  const params = new URLSearchParams(window.location.search);
  const sponsorParam = params.get('sponsor');
  const idParam = params.get('id');
  const actionParam = params.get('action');

  let sponsor = null;
  let sector = null;
  let sectorId = null;

  if (sponsorParam) {
    const found = findSponsorByTrackId(sponsorParam);
    if (found) { sponsor = found.sponsor; sector = found.sector; sectorId = found.sectorId; }
  }
  if (!sector) {
    sectorId = (idParam && sponsorData[idParam]) ? idParam : pickRandomSectorId();
    sector = sponsorData[sectorId];
  }

  const backUrl = `sector.html?id=${encodeURIComponent(sectorId)}`;
  document.querySelectorAll('a[href="sector.html"]').forEach(a => { a.href = backUrl; });

  renderBoothStrip(sector, sponsor);
  renderLeftPane(sector, sponsor);
  renderRightPane(sector, sponsor);

  if (actionParam === 'tier1' || actionParam === 'tier2') {
    const targetId = actionParam === 'tier1' ? 'tier1-card' : 'tier2-card';
    setTimeout(() => {
      const target = document.getElementById(targetId);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 150);
  }
})();
</script>
